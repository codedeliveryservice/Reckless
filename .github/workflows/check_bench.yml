name: Check Bench

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check-bench:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # The x86-64 baseline takes the scalar NNUE path, which the other
          # rows don't cover. Nehalem also confirms it needs nothing past SSE4.2.
          - name: Generic (x86-64)
            sde_flag: -nhm
            rustflags: "-C target-cpu=x86-64"

          - name: Haswell
            sde_flag: -hsw
            rustflags: "-C target-cpu=haswell"

          - name: Skylake (Server)
            sde_flag: -skx
            rustflags: "-C target-cpu=skx"

          - name: Ice Lake (Client)
            sde_flag: -icl
            rustflags: "-C target-cpu=icelake-client"

          - name: Ice Lake (Server)
            sde_flag: -icx
            rustflags: "-C target-cpu=icelake-server"

    name: Check bench on ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 10

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Intel SDE
        uses: petarpetrovt/setup-sde@v5.0
        with:
          sdeVersion: "9.58.0"
          environmentVariableName: SDE_PATH

      - name: Get expected bench
        shell: bash
        run: |
          expected_bench=$(git log --reverse -10 --format=format:%B | tac | grep --max-count=1 --only-matching "^[[:space:]]*\b[Bb]ench[ :]\+[[:digit:]]*[[:space:]]*$" | grep --only-matching "[[:digit:]]*")
          [[ -n "$expected_bench" ]] || (echo "No Bench Found" && exit 1)
          echo "expected_bench=$expected_bench" >> $GITHUB_ENV
          echo "Expected Bench: $expected_bench"

      - name: Get measured bench
        shell: bash
        run: |
          echo "RUSTFLAGS:" $RUSTFLAGS
          cargo +nightly -Z target-applies-to-host rustc --release --bin reckless -- --emit link=reckless
          measured_bench=$("$SDE_PATH/sde" ${{ matrix.sde_flag }} -- ./reckless bench | tail -1 | cut "--delimiter= " -f 2 -)
          echo "measured_bench=$measured_bench" >> $GITHUB_ENV
          echo "Measured Bench: $measured_bench"
        env:
          CARGO_TARGET_APPLIES_TO_HOST: false
          RUSTFLAGS: ${{ matrix.rustflags }}

      - name: Check bench
        shell: bash
        run: |
          if [ "$expected_bench" != "$measured_bench" ]; then
            echo "Bench mismatch"
            exit 1
          fi

  # macos runs natively on Apple Silicon, so this covers the neon path that
  # SDE can't and that release.yml ships. No SDE, no cross-cpu rustflags.
  check-bench-arm:
    runs-on: macos-latest
    name: Check bench on Apple Silicon (neon)

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 10

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Confirm the build targets neon
        shell: bash
        run: rustc --print cfg | grep -q 'target_feature="neon"'

      - name: Get expected bench
        shell: bash
        run: |
          messages=$(git log -10 --format=%B)
          expected_bench=$(grep -m1 -E "^[[:space:]]*[Bb]ench[ :]" <<< "$messages" | grep -Eo "[[:digit:]]+")
          [[ -n "$expected_bench" ]] || (echo "No Bench Found" && exit 1)
          echo "expected_bench=$expected_bench" >> $GITHUB_ENV
          echo "Expected Bench: $expected_bench"

      - name: Get measured bench
        shell: bash
        run: |
          cargo build --release --bin reckless
          measured_bench=$(./target/release/reckless bench | tail -1 | cut -d " " -f 2)
          echo "measured_bench=$measured_bench" >> $GITHUB_ENV
          echo "Measured Bench: $measured_bench"

      - name: Check bench
        shell: bash
        run: |
          if [ "$expected_bench" != "$measured_bench" ]; then
            echo "Bench mismatch"
            exit 1
          fi
